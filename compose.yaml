services:
  db:
    build:
      context: ./hookah-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hookah}
      POSTGRES_USER: ${POSTGRES_USER:-hookah}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hookah_local}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - hookah-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-hookah} -d ${POSTGRES_DB:-hookah}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  db-migrate:
    build:
      context: ./hookah-db
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-hookah}
      POSTGRES_USER: ${POSTGRES_USER:-hookah}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hookah_local}
    command: ["/opt/hookah-db/docker/run-migrations.sh"]
    restart: "no"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-hookah}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-hookah_media_local}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - hookah-minio-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-http://minio:9000}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-hookah}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-hookah_media_local}
      OBJECT_STORAGE_BUCKET_HOOKAH_MEDIA: ${OBJECT_STORAGE_BUCKET_HOOKAH_MEDIA:-hookah-media}
    volumes:
      - ./docker/minio/cors.json:/config/cors.json:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set hookah "$${OBJECT_STORAGE_ENDPOINT}" "$${OBJECT_STORAGE_ACCESS_KEY}" "$${OBJECT_STORAGE_SECRET_KEY}" \
        && mc mb --ignore-existing "hookah/$${OBJECT_STORAGE_BUCKET_HOOKAH_MEDIA}" \
        && mc anonymous set public "hookah/$${OBJECT_STORAGE_BUCKET_HOOKAH_MEDIA}" \
        && mc cors set "hookah/$${OBJECT_STORAGE_BUCKET_HOOKAH_MEDIA}" /config/cors.json
    restart: "no"

  api:
    build:
      context: ./hookah-api
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      PORT: 3000
      APP_ORIGIN: http://localhost:${WEB_PORT:-8080}
      DATABASE_URL: postgresql://${POSTGRES_USER:-hookah}:${POSTGRES_PASSWORD:-hookah_local}@db:5432/${POSTGRES_DB:-hookah}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-http://minio:9000}
      OBJECT_STORAGE_PUBLIC_URL: ${OBJECT_STORAGE_PUBLIC_URL:-http://localhost:9000}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-ru-msk-1}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-hookah}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-hookah_media_local}
      OBJECT_STORAGE_BUCKET_HOOKAH_MEDIA: ${OBJECT_STORAGE_BUCKET_HOOKAH_MEDIA:-hookah-media}
    ports:
      - '${API_PORT:-3000}:3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/api/v1/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./hookah-web
      args:
        VITE_API_BASE_URL: /api/v1
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '${WEB_PORT:-8080}:80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1/ || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  hookah-postgres-data:
  hookah-minio-data:
